<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>수급 분석 대시보드 v3</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: -apple-system, 'Malgun Gothic', '맑은 고딕', sans-serif;
    background: #0f1923;
    color: #e0e6ed;
    line-height: 1.6;
}

/* ── 헤더 ─────────────────────── */
.header {
    background: linear-gradient(135deg, #1a2634 0%, #0f1923 100%);
    border-bottom: 1px solid #2a3a4a;
    padding: 16px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: sticky;
    top: 0;
    z-index: 100;
    flex-wrap: wrap;
    gap: 8px;
}
.header-left { display: flex; align-items: center; gap: 16px; }
.header h1 {
    font-size: 20px;
    font-weight: 700;
    color: #fff;
}
.header h1 span { color: #4ecdc4; }
.header-date {
    font-size: 14px;
    color: #8899aa;
}
.header-right { display: flex; align-items: center; gap: 10px; }
.header-refresh {
    background: #2a3a4a;
    border: none;
    color: #8899aa;
    padding: 8px 16px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    transition: all 0.2s;
}
.header-refresh:hover { background: #3a4a5a; color: #fff; }
.header-refresh.loading { animation: spin 1s linear infinite; }
@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

.refresh-info {
    font-size: 12px;
    color: #8899aa;
    text-align: right;
    line-height: 1.5;
}

/* ── 요약 카드 ────────────────── */
.summary-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px;
    padding: 20px 24px;
}
.summary-card {
    background: #1a2634;
    border-radius: 12px;
    padding: 16px;
    text-align: center;
    border: 1px solid #2a3a4a;
    transition: transform 0.2s, border-color 0.2s;
}
.summary-card:hover { transform: translateY(-2px); border-color: #3a4a5a; }
.summary-card .number {
    font-size: 28px;
    font-weight: 700;
    color: #fff;
}
.summary-card .label {
    font-size: 12px;
    color: #8899aa;
    margin-top: 4px;
}
.summary-card.accent .number { color: #ff6b6b; }
.summary-card.green .number { color: #4ecdc4; }
.summary-card.yellow .number { color: #ffd93d; }
.summary-card.blue .number { color: #6c9fff; }
.summary-card.purple .number { color: #b388ff; }

/* ── 메인 콘텐츠 ─────────────── */
.main { padding: 0 24px 40px; }

/* ── 섹션 타이틀 ─────────────── */
.section-title {
    font-size: 16px;
    font-weight: 700;
    color: #fff;
    margin: 24px 0 12px;
    display: flex;
    align-items: center;
    gap: 8px;
}
.section-title .icon { font-size: 18px; }

/* ── 주도 섹터 ────────────────── */
.sectors-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 16px;
    margin-bottom: 24px;
}
.sector-card {
    background: #1a2634;
    border: 1px solid #2a3a4a;
    border-radius: 12px;
    padding: 16px;
    transition: transform 0.2s, border-color 0.2s;
}
.sector-card:hover { transform: translateY(-2px); border-color: #4ecdc4; }
.sector-card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
}
.sector-card-header h3 {
    font-size: 15px;
    font-weight: 700;
    color: #fff;
}
.sector-rank {
    background: #4ecdc4;
    color: #0f1923;
    font-size: 11px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 10px;
}
.sector-stats {
    display: flex;
    gap: 16px;
    margin-bottom: 12px;
    font-size: 13px;
}
.sector-stat-label { color: #667788; }
.sector-stat-value { color: #e0e6ed; font-weight: 600; }
.sector-stat-value.positive { color: #ff6b6b; }
.sector-stat-value.negative { color: #4ecdc4; }
.sector-top-stocks { border-top: 1px solid #2a3a4a; padding-top: 10px; }
.sector-stock-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 4px 0;
    font-size: 13px;
}
.sector-stock-name { color: #c0c8d0; font-weight: 500; }
.sector-stock-tags { display: flex; gap: 4px; flex-wrap: wrap; }
.sector-stock-amount { color: #8899aa; font-size: 12px; }

/* ── 태그 뱃지 ────────────────── */
.tag-badge {
    display: inline-block;
    font-size: 10px;
    font-weight: 600;
    padding: 2px 6px;
    border-radius: 4px;
    line-height: 1.4;
    white-space: nowrap;
}
.tag-가속 { background: rgba(66, 133, 244, 0.2); color: #6c9fff; border: 1px solid rgba(66, 133, 244, 0.3); }
.tag-손바뀜 { background: rgba(179, 136, 255, 0.2); color: #b388ff; border: 1px solid rgba(179, 136, 255, 0.3); }
.tag-체결강도↑ { background: rgba(255, 107, 107, 0.2); color: #ff6b6b; border: 1px solid rgba(255, 107, 107, 0.3); }
.tag-거래량↑ { background: rgba(78, 205, 196, 0.2); color: #4ecdc4; border: 1px solid rgba(78, 205, 196, 0.3); }
.tag-RS강함 { background: rgba(255, 165, 0, 0.2); color: #ffa500; border: 1px solid rgba(255, 165, 0, 0.3); }
.tag-default { background: rgba(136, 153, 170, 0.2); color: #8899aa; border: 1px solid rgba(136, 153, 170, 0.3); }

/* ── 탭 & 컨트롤 ────────────── */
.controls-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
    flex-wrap: wrap;
    gap: 8px;
}
.tab-group { display: flex; gap: 4px; }
.tab-btn {
    background: #1a2634;
    border: 1px solid #2a3a4a;
    color: #8899aa;
    padding: 8px 16px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    transition: all 0.2s;
}
.tab-btn:hover { color: #fff; border-color: #3a4a5a; }
.tab-btn.active {
    background: #4ecdc4;
    color: #0f1923;
    border-color: #4ecdc4;
    font-weight: 700;
}
.sort-select {
    background: #1a2634;
    border: 1px solid #2a3a4a;
    color: #e0e6ed;
    padding: 8px 12px;
    border-radius: 8px;
    font-size: 13px;
    cursor: pointer;
}
.sort-select:focus { outline: none; border-color: #4ecdc4; }

/* ── 테이블 ──────────────────── */
.table-wrap {
    background: #1a2634;
    border: 1px solid #2a3a4a;
    border-radius: 12px;
    overflow-x: auto;
}
table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
}
thead th {
    background: #15202b;
    color: #8899aa;
    font-weight: 600;
    padding: 12px 14px;
    text-align: left;
    white-space: nowrap;
    border-bottom: 1px solid #2a3a4a;
    position: sticky;
    top: 0;
    cursor: pointer;
    user-select: none;
}
thead th:hover { color: #fff; }
thead th .help-icon {
    display: inline-block;
    width: 14px;
    height: 14px;
    line-height: 14px;
    text-align: center;
    font-size: 10px;
    background: #2a3a4a;
    color: #667788;
    border-radius: 50%;
    margin-left: 4px;
    cursor: help;
}
thead th .help-icon:hover { background: #3a4a5a; color: #fff; }
.tooltip-popup {
    position: fixed;
    background: #2a3a4a;
    color: #e0e6ed;
    padding: 12px 16px;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 400;
    white-space: normal;
    width: 260px;
    line-height: 1.6;
    z-index: 9999;
    box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    border: 1px solid #3a4a5a;
    display: none;
}
.tooltip-popup.show { display: block; }

tbody tr {
    border-bottom: 1px solid #1e2d3d;
    transition: background 0.15s;
}
tbody tr:hover { background: #1e2d3d; }
tbody tr.inflow { border-left: 3px solid #ff6b6b; }
tbody td {
    padding: 10px 14px;
    white-space: nowrap;
}
.stock-name {
    font-weight: 600;
    color: #fff;
}
.stock-code {
    font-size: 11px;
    color: #667788;
    margin-left: 4px;
}
.stock-market {
    font-size: 10px;
    color: #4a5a6a;
    margin-left: 4px;
}
.amount-positive { color: #ff6b6b; font-weight: 600; }
.amount-negative { color: #4ecdc4; font-weight: 600; }
.stars { color: #ffd93d; font-size: 12px; letter-spacing: 1px; }
.tags-cell { display: flex; gap: 3px; flex-wrap: wrap; max-width: 220px; }
.vp-value { font-weight: 600; }
.vp-high { color: #ff6b6b; }
.vp-mid { color: #ffd93d; }
.vp-low { color: #8899aa; }
.rs-positive { color: #ff6b6b; }
.rs-negative { color: #4ecdc4; }
.ref-score { font-weight: 700; }
.ref-high { color: #ffd93d; }
.ref-mid { color: #e0e6ed; }
.ref-low { color: #667788; }
.sector-cell { color: #8899aa; font-size: 12px; max-width: 100px; overflow: hidden; text-overflow: ellipsis; }

/* ── 로딩 & 에러 ─────────────── */
.loading-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(15, 25, 35, 0.8);
    z-index: 999;
    justify-content: center;
    align-items: center;
}
.loading-overlay.show { display: flex; }
.loading-spinner {
    width: 40px; height: 40px;
    border: 3px solid #2a3a4a;
    border-top-color: #4ecdc4;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
}
.error-msg {
    background: rgba(255, 107, 107, 0.1);
    border: 1px solid rgba(255, 107, 107, 0.3);
    color: #ff6b6b;
    padding: 12px 20px;
    border-radius: 8px;
    margin: 20px 24px;
    display: none;
    font-size: 14px;
}
.error-msg.show { display: block; }

/* ── 푸터 ────────────────────── */
.footer {
    text-align: center;
    padding: 20px;
    color: #4a5a6a;
    font-size: 12px;
    border-top: 1px solid #1e2d3d;
}

/* ── 반응형 ──────────────────── */
@media (max-width: 768px) {
    .header { padding: 12px 16px; }
    .header h1 { font-size: 16px; }
    .summary-row { padding: 12px 16px; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); }
    .summary-card .number { font-size: 22px; }
    .main { padding: 0 16px 30px; }
    .sectors-grid { grid-template-columns: 1fr; }
    .controls-row { flex-direction: column; align-items: flex-start; }
    table { font-size: 12px; }
    thead th, tbody td { padding: 8px 10px; }
}
</style>
</head>
<body>

<!-- 툴팁 팝업 (fixed position) -->
<div class="tooltip-popup" id="tooltipPopup"></div>

<!-- 로딩 오버레이 -->
<div class="loading-overlay" id="loadingOverlay">
    <div class="loading-spinner"></div>
</div>

<!-- 헤더 -->
<div class="header">
    <div class="header-left">
        <h1>수급 분석 <span>대시보드</span></h1>
        <span class="header-date" id="headerDate">-</span>
    </div>
    <div class="header-right">
        <span class="refresh-info" id="refreshInfo"></span>
        <button class="header-refresh" id="refreshBtn" onclick="loadData()">&#x21bb; 새로고침</button>
    </div>
</div>

<!-- 에러 메시지 -->
<div class="error-msg" id="errorMsg"></div>

<!-- 요약 카드 -->
<div class="summary-row">
    <div class="summary-card">
        <div class="number" id="sumTotal">-</div>
        <div class="label">분석 종목</div>
    </div>
    <div class="summary-card accent">
        <div class="number" id="sumInflow">-</div>
        <div class="label">수급 유입</div>
    </div>
    <div class="summary-card yellow">
        <div class="number" id="sumVpHigh">-</div>
        <div class="label">체결강도 150%↑</div>
    </div>
    <div class="summary-card green">
        <div class="number" id="sumRsStrong">-</div>
        <div class="label">RS +5%↑</div>
    </div>
    <div class="summary-card purple">
        <div class="number" id="sumLeadingSectors">-</div>
        <div class="label">주도 섹터</div>
    </div>
</div>

<!-- 메인 -->
<div class="main">

    <!-- 주도 섹터 -->
    <div class="section-title"><span class="icon">&#x1F4CA;</span> 주도 섹터</div>
    <div class="sectors-grid" id="sectorsGrid">
        <!-- JS로 채움 -->
    </div>

    <!-- 종목 테이블 -->
    <div class="section-title"><span class="icon">&#x1F4CB;</span> 종목 리스트</div>
    <div class="controls-row">
        <div class="tab-group">
            <button class="tab-btn active" data-tab="all" onclick="switchTab('all', this)">전체 TOP 50</button>
            <button class="tab-btn" data-tab="inflow" onclick="switchTab('inflow', this)">수급 유입</button>
            <button class="tab-btn" data-tab="tags3" onclick="switchTab('tags3', this)">태그 3+&#x2605;</button>
        </div>
        <select class="sort-select" id="sortSelect" onchange="applySort()">
            <option value="net_today_amount">순매수금액순</option>
            <option value="vol_power_today">체결강도순</option>
            <option value="rel_strength_1m">상대강도순</option>
            <option value="ref_score">참고스코어순</option>
            <option value="tag_count">태그수순</option>
        </select>
    </div>
    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>종목</th>
                    <th>섹터</th>
                    <th>순매수금액
                        <span class="help-icon" data-tip="당일 기관+외국인 순매수 합산 금액. 양수=순매수(빨강), 음수=순매도(파랑).">?</span>
                    </th>
                    <th>태그
                        <span class="help-icon" data-tip="수급 특성 태그. 가속=매수세 강화, 손바뀜=수급 주체 변경, 체결강도↑=체결강도 높음, 거래량↑=거래량 증가, RS강함=상대강도 우수.">?</span>
                    </th>
                    <th>체결강도
                        <span class="help-icon" data-tip="매수체결량/매도체결량 비율(%). 100% 이상이면 매수 우위. 150% 이상은 강한 매수세.">?</span>
                    </th>
                    <th>상대강도(RS)
                        <span class="help-icon" data-tip="1개월 기준 시장 대비 상대 수익률(%). 양수면 시장보다 강한 종목.">?</span>
                    </th>
                    <th>참고스코어
                        <span class="help-icon" data-tip="순매수금액, 체결강도, 태그 등을 종합한 참고 점수. 높을수록 수급 상황이 좋은 편.">?</span>
                    </th>
                </tr>
            </thead>
            <tbody id="stockTableBody">
                <!-- JS로 채움 -->
            </tbody>
        </table>
    </div>
</div>

<!-- 푸터 -->
<div class="footer">
    수급 분석 대시보드 v3 &mdash; 본 데이터는 참고용이며 투자 판단의 근거가 될 수 없습니다.
</div>

<script>
// ── 전역 상태 ─────────────────────
let allStocks = [];
let currentTab = 'all';
let autoRefreshTimer = null;

// ── 초기화 ────────────────────────
document.addEventListener('DOMContentLoaded', () => {
    loadData();
    startAutoRefresh();
    initTooltips();
});

function startAutoRefresh() {
    if (autoRefreshTimer) clearInterval(autoRefreshTimer);
    autoRefreshTimer = setInterval(() => {
        loadData();
    }, 5 * 60 * 1000);
}

// ── 데이터 로드 ───────────────────
async function loadData() {
    const overlay = document.getElementById('loadingOverlay');
    const errorEl = document.getElementById('errorMsg');
    overlay.classList.add('show');
    errorEl.classList.remove('show');

    try {
        const resp = await fetch('/api/supply-report');
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const data = await resp.json();
        renderDashboard(data);
    } catch (e) {
        errorEl.textContent = '데이터를 불러오지 못했습니다: ' + e.message;
        errorEl.classList.add('show');
    } finally {
        overlay.classList.remove('show');
    }
}

// ── 렌더링 ────────────────────────
function renderDashboard(data) {
    // 날짜
    document.getElementById('headerDate').textContent = data.date || '-';

    // 갱신 시간 표시
    const refreshInfo = document.getElementById('refreshInfo');
    const lastUpdated = data.last_updated;
    const nextRefresh = data.next_refresh;
    let infoText = '';
    if (lastUpdated) {
        infoText = lastUpdated + ' 기준 새로고침';
    } else {
        // last_updated 없으면 날짜로 표시
        const d = data.date || '';
        if (d.length === 8) {
            infoText = d.slice(0,4) + '년 ' + d.slice(4,6) + '월 ' + d.slice(6,8) + '일 기준';
        }
    }
    if (nextRefresh) {
        infoText += ' (다음 갱신 ' + nextRefresh + ')';
    }
    refreshInfo.textContent = infoText;

    // 요약
    const s = data.summary || {};
    document.getElementById('sumTotal').textContent = s.total_stocks ?? '-';
    document.getElementById('sumInflow').textContent = s.inflow_count ?? '-';
    document.getElementById('sumVpHigh').textContent = s.vp_high_count ?? '-';
    document.getElementById('sumRsStrong').textContent = s.rs_strong_count ?? '-';

    const sectors = data.leading_sectors || [];
    document.getElementById('sumLeadingSectors').textContent = sectors.length;

    // 주도 섹터
    renderSectors(sectors);

    // 종목 저장 & 렌더
    allStocks = (data.supply_stocks || []).map(st => {
        // tags를 배열로 파싱
        let tags = st.tags;
        if (typeof tags === 'string') {
            try { tags = JSON.parse(tags); } catch(e) { tags = []; }
        }
        if (!Array.isArray(tags)) tags = [];
        return { ...st, tags };
    });

    applySort();
}

// ── 섹터 렌더 ─────────────────────
function renderSectors(sectors) {
    const grid = document.getElementById('sectorsGrid');
    if (!sectors.length) {
        grid.innerHTML = '<div style="color:#667788; padding:20px;">섹터 데이터 없음</div>';
        return;
    }
    grid.innerHTML = sectors.map(sec => {
        const topStocks = (sec.top_stocks || []).slice(0, 3);
        const amtStr = formatAmount(sec.total_net_amount);
        const amtClass = sec.total_net_amount >= 0 ? 'positive' : 'negative';
        return `
        <div class="sector-card">
            <div class="sector-card-header">
                <h3>${esc(sec.sector_name)}</h3>
                <span class="sector-rank">#${sec.rank}</span>
            </div>
            <div class="sector-stats">
                <div>
                    <span class="sector-stat-label">순매수 </span>
                    <span class="sector-stat-value ${amtClass}">${amtStr}</span>
                </div>
                <div>
                    <span class="sector-stat-label">유입 </span>
                    <span class="sector-stat-value">${sec.supply_stock_count || 0}종목</span>
                </div>
            </div>
            <div class="sector-top-stocks">
                ${topStocks.map(ts => {
                    let tsTags = ts.tags;
                    if (typeof tsTags === 'string') {
                        try { tsTags = JSON.parse(tsTags); } catch(e) { tsTags = []; }
                    }
                    if (!Array.isArray(tsTags)) tsTags = [];
                    return `
                    <div class="sector-stock-row">
                        <span class="sector-stock-name">${esc(ts.name)}</span>
                        <span class="sector-stock-tags">${renderTags(tsTags)}</span>
                        <span class="sector-stock-amount">${formatAmount(ts.net_amount)}</span>
                    </div>`;
                }).join('')}
            </div>
        </div>`;
    }).join('');
}

// ── 탭 전환 ───────────────────────
function switchTab(tab, btn) {
    currentTab = tab;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderTable();
}

// ── 정렬 적용 ─────────────────────
function applySort() {
    const sortKey = document.getElementById('sortSelect').value;
    allStocks.sort((a, b) => {
        const va = Number(a[sortKey]) || 0;
        const vb = Number(b[sortKey]) || 0;
        return vb - va; // 내림차순
    });
    renderTable();
}

// ── 테이블 렌더 ───────────────────
function renderTable() {
    let stocks = [...allStocks];

    // 탭 필터
    if (currentTab === 'inflow') {
        stocks = stocks.filter(s => s.is_inflow);
    } else if (currentTab === 'tags3') {
        stocks = stocks.filter(s => (s.tag_count || 0) >= 3);
    }

    // TOP 50
    stocks = stocks.slice(0, 50);

    const tbody = document.getElementById('stockTableBody');
    if (!stocks.length) {
        tbody.innerHTML = '<tr><td colspan="8" style="text-align:center; padding:30px; color:#667788;">해당 종목이 없습니다</td></tr>';
        return;
    }

    tbody.innerHTML = stocks.map((st, i) => {
        const inflowClass = st.is_inflow ? ' inflow' : '';
        const amtStr = formatAmount(st.net_today_amount);
        const amtClass = (st.net_today_amount || 0) >= 0 ? 'amount-positive' : 'amount-negative';

        // 체결강도
        const vp = st.vol_power_today ?? 0;
        let vpClass = 'vp-low';
        if (vp >= 150) vpClass = 'vp-high';
        else if (vp >= 100) vpClass = 'vp-mid';

        // RS
        const rs = st.rel_strength_1m ?? 0;
        const rsClass = rs >= 0 ? 'rs-positive' : 'rs-negative';

        // 참고스코어
        const refSc = st.ref_score ?? 0;
        let refClass = 'ref-low';
        if (refSc >= 70) refClass = 'ref-high';
        else if (refSc >= 40) refClass = 'ref-mid';

        // 태그 수 별
        const stars = '★'.repeat(Math.min(st.tag_count || 0, 5));

        return `
        <tr class="${inflowClass}">
            <td style="color:#667788;">${i + 1}</td>
            <td>
                <span class="stock-name">${esc(st.stock_name)}</span>
                <span class="stock-code">${esc(st.stock_code)}</span>
                <span class="stock-market">${esc(st.market || '')}</span>
            </td>
            <td class="sector-cell">${esc(getSector(st))}</td>
            <td class="${amtClass}">${amtStr}</td>
            <td>
                <div class="tags-cell">${renderTags(st.tags)}</div>
                ${stars ? `<span class="stars">${stars}</span>` : ''}
            </td>
            <td class="vp-value ${vpClass}">${vp.toFixed(1)}%</td>
            <td class="${rsClass}">${rs >= 0 ? '+' : ''}${rs.toFixed(1)}%</td>
            <td class="ref-score ${refClass}">${refSc.toFixed(1)}</td>
        </tr>`;
    }).join('');
}

// ── 유틸 ──────────────────────────
function formatAmount(val) {
    if (val == null) return '-';
    const v = Number(val);
    if (isNaN(v)) return '-';
    const abs = Math.abs(v);
    const sign = v >= 0 ? '+' : '-';
    if (abs >= 100) {
        // 억 단위 (val은 백만원 단위라 가정, 100백만 = 1억)
        return sign + (abs / 100).toFixed(1) + '억';
    }
    return sign + abs.toFixed(0) + '백만';
}

const TAG_CLASSES = {
    '가속': 'tag-가속',
    '손바뀜': 'tag-손바뀜',
    '체결강도↑': 'tag-체결강도↑',
    '거래량↑': 'tag-거래량↑',
    'RS강함': 'tag-RS강함'
};

function renderTags(tags) {
    if (!tags || !tags.length) return '';
    return tags.map(t => {
        const cls = TAG_CLASSES[t] || 'tag-default';
        return `<span class="tag-badge ${cls}">${esc(t)}</span>`;
    }).join('');
}

const KRX_SECTOR_MAP = {
    '001': '음식료품', '002': '전기전자', '003': '의약품', '004': '비금속광물',
    '005': '철강금속', '006': '기계', '007': '화학', '008': '섬유의복',
    '009': '유통업', '010': '건설업', '011': '운수장비', '012': '운수창고',
    '013': '통신업', '014': '전기가스', '015': '은행', '016': '증권',
    '017': '보험', '018': '서비스업', '019': '종이목재', '020': '기타금융',
    '021': '기타제조', '022': '의료정밀', '024': 'IT', '025': '반도체',
    '026': '소프트웨어', '027': '디지털컨텐츠', '028': '인터넷', '029': '바이오',
    '030': '게임', '031': '통신장비', '032': '정보기기', '033': '방송서비스',
    '034': '기타서비스',
};

const THEME_NAME_MAP = {
    'NUCLEAR': '원자력', 'SEMICONDUCTOR': '반도체', 'BATTERY': '2차전지',
    'BIO': '바이오', 'DEFENSE': '방산', 'ROBOT': '로봇', 'AI': 'AI',
    'HYDROGEN': '수소', 'SOLAR': '태양광', 'EV': '전기차',
};

function getSector(st) {
    // 1순위: sector_name (DB에 저장된 업종명)
    if (st.sector_name) return st.sector_name;
    // 2순위: sector_code → KRX 업종 매핑
    if (st.sector_code && KRX_SECTOR_MAP[st.sector_code]) return KRX_SECTOR_MAP[st.sector_code];
    // 3순위: theme_list에서 첫번째 테마
    let tl = st.theme_list;
    if (!tl) return '-';
    if (typeof tl === 'string') {
        try { tl = JSON.parse(tl); } catch(e) { return tl; }
    }
    if (Array.isArray(tl) && tl.length > 0) {
        const t = tl[0];
        if (t) return THEME_NAME_MAP[t] || t;
    }
    // 4순위: market (KOSPI/KOSDAQ)
    return st.market || '-';
}

function initTooltips() {
    const popup = document.getElementById('tooltipPopup');
    document.addEventListener('click', (e) => {
        const icon = e.target.closest('.help-icon[data-tip]');
        if (icon) {
            e.stopPropagation();
            const tip = icon.getAttribute('data-tip');
            popup.textContent = tip;
            // 아이콘 위치 기준으로 팝업 표시
            const rect = icon.getBoundingClientRect();
            let left = rect.left + rect.width / 2 - 130;
            let top = rect.bottom + 8;
            // 화면 밖으로 나가지 않게 조정
            if (left < 8) left = 8;
            if (left + 260 > window.innerWidth) left = window.innerWidth - 268;
            if (top + 100 > window.innerHeight) top = rect.top - 80;
            popup.style.left = left + 'px';
            popup.style.top = top + 'px';
            popup.classList.add('show');
        } else {
            popup.classList.remove('show');
        }
    });
}

function esc(str) {
    if (!str) return '';
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
}
